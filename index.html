<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>坦克大战 - Tank Battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Courier New', monospace;
            color: #fff;
            overflow: hidden;
            padding: 10px;
        }
        
        h1 {
            margin-bottom: 5px;
            text-shadow: 0 0 10px #00ff00;
            font-size: 1.5em;
        }
        
        .game-info {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
            font-size: 0.9em;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .info-item {
            background: rgba(0, 255, 0, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            border: 2px solid #00ff00;
        }
        
        #gameContainer {
            position: relative;
            border: 4px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            background: #000;
            max-width: 100%;
        }
        
        #gameCanvas {
            display: block;
            max-width: 100%;
            max-height: 50vh;
        }
        
        .controls {
            margin-top: 10px;
            text-align: center;
            color: #888;
            font-size: 0.8em;
        }
        
        .controls p {
            margin: 3px 0;
        }
        
        .btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 30px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .btn:hover, .btn:active {
            background: #00cc00;
            transform: scale(1.05);
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 10px;
            border: 3px solid #ff0000;
            text-align: center;
            display: none;
            z-index: 100;
        }
        
        #gameOver h2 {
            color: #ff0000;
            font-size: 1.8em;
            margin-bottom: 15px;
        }
        
        #gameOver p {
            font-size: 1.2em;
            margin-bottom: 15px;
        }
        
        /* 移动端控制按钮 */
        .mobile-controls {
            display: none;
            margin-top: 10px;
            width: 100%;
            max-width: 400px;
        }
        
        .mobile-controls.active {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }
        
        .d-pad-btn {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 0, 0.3);
            border: 2px solid #00ff00;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #00ff00;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .d-pad-btn:active {
            background: rgba(0, 255, 0, 0.6);
            transform: scale(0.95);
        }
        
        .d-pad-btn.empty {
            background: transparent;
            border: none;
            pointer-events: none;
        }
        
        .shoot-btn {
            width: 100px;
            height: 100px;
            background: rgba(255, 0, 0, 0.3);
            border: 3px solid #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #ff0000;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .shoot-btn:active {
            background: rgba(255, 0, 0, 0.6);
            transform: scale(0.95);
        }
        
        /* 在触摸设备上显示移动端控制 */
        @media (hover: none) and (pointer: coarse) {
            .mobile-controls {
                display: flex;
            }
            
            .controls {
                display: none;
            }
        }
        
        /* 小屏幕适配 */
        @media (max-height: 700px) {
            h1 {
                font-size: 1.2em;
            }
            
            .game-info {
                font-size: 0.8em;
            }
            
            .info-item {
                padding: 3px 8px;
            }
            
            .d-pad {
                grid-template-columns: repeat(3, 50px);
                grid-template-rows: repeat(3, 50px);
            }
            
            .d-pad-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            
            .shoot-btn {
                width: 80px;
                height: 80px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <h1>🔥 坦克大战 🔥</h1>
    
    <div class="game-info">
        <div class="info-item">❤️ 生命: <span id="lives">3</span></div>
        <div class="info-item">⭐ 分数: <span id="score">0</span></div>
        <div class="info-item">🎯 敌人: <span id="enemies">0</span></div>
        <div class="info-item">⏱️ 时间: <span id="time">0:00</span></div>
    </div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="gameOver">
            <h2 id="gameOverTitle">游戏结束</h2>
            <p id="finalScore">最终分数: 0</p>
            <p id="timeBonus" style="color: #00ff00; font-size: 1.2em; margin-bottom: 15px; display: none;">时间奖励: +0</p>
            <button class="btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>
    
    <div class="controls">
        <p><strong>操作说明:</strong> ⬆️⬇️⬅️➡️ 方向键移动 | 空格键 射击</p>
        <p>🧱 <strong>砖墙</strong>(棕色)可摧毁 | ⬜ <strong>钢墙</strong>(银色)不可摧毁</p>
        <p>⚡ 通关越快，时间奖励越高！(60秒内通关奖励500分)</p>
    </div>
    
    <!-- 移动端控制按钮 -->
    <div class="mobile-controls" id="mobileControls">
        <div class="d-pad">
            <div class="d-pad-btn empty"></div>
            <div class="d-pad-btn" id="btnUp">⬆️</div>
            <div class="d-pad-btn empty"></div>
            <div class="d-pad-btn" id="btnLeft">⬅️</div>
            <div class="d-pad-btn empty"></div>
            <div class="d-pad-btn" id="btnRight">➡️</div>
            <div class="d-pad-btn empty"></div>
            <div class="d-pad-btn" id="btnDown">⬇️</div>
            <div class="d-pad-btn empty"></div>
        </div>
        <div class="shoot-btn" id="btnShoot">🔥<br>射击</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
